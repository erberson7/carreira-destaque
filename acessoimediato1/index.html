<!DOCTYPE html>
<html lang="pt-br">
<head>

<link rel="icon" type="image/png" sizes="48x48" href="/images/favicon-48.png">
<link rel="icon" type="image/png" sizes="64x64" href="/images/favicon-64.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carreira em Destaque</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
}

img {
    width: 100%;
    display: block;
}

.desktop {
    display: block;
}

.mobile {
    display: none;
}

@media (max-width: 768px) {
    .desktop {
        display: none;
    }

    .mobile {
        display: block;
    }
}
</style>

</head>

<body>

<!-- VERSÃO PC: vários blocos -->
<div class="desktop">
  <img src="../images/hero.png">
  <img src="../images/dor.png">
  <img src="../images/autoridade.png">
  <img src="../images/aprendizado.png">
  <img src="../images/jornada.png">
  <img src="../images/transformacao.png">
  <img src="../images/prova-social.png">
  <img src="../images/produto.png">
  <img src="../images/oferta.png">
  <img src="../images/cta.png">
</div>

<!-- VERSÃO MOBILE: imagem única -->
<div class="mobile">
    <img src="../images/pagina1-versao-mobile2.png">
</div>

</body>
</html>
